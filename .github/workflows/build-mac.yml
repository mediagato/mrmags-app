name: Build Mac DMG

on:
  push:
    branches: [main]
    paths-ignore: ['README.md', '**/*.md']
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write  # needed when uploading to a release

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build .dmg (unsigned, for v0)
        env:
          # Skip code signing for v0 — Mags right-clicks → Open the first time.
          # When Apple Developer Program enrollment lands, populate CSC_LINK +
          # CSC_KEY_PASSWORD as repo secrets and electron-builder picks them up.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac

      - name: Surface the artifact name
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: mrmags-mac-dmg
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
