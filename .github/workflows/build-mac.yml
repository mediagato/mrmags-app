name: Build Installers (Mac + Windows)

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore: ['README.md', '**/*.md']
  workflow_dispatch:

permissions:
  contents: write  # needed when uploading to a release

jobs:

  build-mac:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci || npm install
      - name: Build universal .dmg (arm64 + x64)
        env:
          # Skip code signing for v0 — users right-click → Open the first time.
          # When Apple Developer Program enrollment lands, populate CSC_LINK +
          # CSC_KEY_PASSWORD as repo secrets and electron-builder picks them up.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac
      - run: ls -la dist/
      - name: Smoke test (mount, install, launch, round-trip MCP)
        timeout-minutes: 5
        shell: bash
        run: |
          set -ex
          DMG=$(ls dist/*.dmg | head -1)
          echo "smoke: $DMG"
          # Mount the DMG. -plist gives parseable XML output even with -nobrowse.
          # No -quiet: we want failures to print on the runner.
          hdiutil attach -nobrowse -noverify -plist "$DMG" > /tmp/mount.plist
          # Extract the mount-point. Universal binary DMGs sometimes mount
          # multiple entries; the last <string>/Volumes/...</string> is the
          # actual filesystem root.
          VOLUME=$(grep -o '/Volumes/[^<]*' /tmp/mount.plist | tail -1)
          [ -n "$VOLUME" ] || { echo "FAIL: mount returned no volume"; cat /tmp/mount.plist; exit 1; }
          echo "mounted at: $VOLUME"
          ls -la "$VOLUME"
          # Kill any stale instance from a previous run before overwriting
          pkill -f "Mr. Mags" || true
          sleep 2
          # Copy app to /Applications (the real install path)
          rm -rf "/Applications/Mr. Mags.app"
          cp -R "$VOLUME/Mr. Mags.app" "/Applications/"
          hdiutil detach "$VOLUME" || hdiutil detach -force "$VOLUME"
          # Strip the quarantine flag so unsigned binary launches without nag
          xattr -dr com.apple.quarantine "/Applications/Mr. Mags.app" || true
          # Launch the app — open(1) returns immediately, app runs in background
          open -n "/Applications/Mr. Mags.app"
          # Wait up to 30s for HTTP API to come up
          for i in $(seq 1 60); do
            if curl -fsS --max-time 3 http://127.0.0.1:11436/health >/dev/null 2>&1; then
              echo "API came up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS --max-time 5 http://127.0.0.1:11436/health || { echo "FAIL: /health never came up"; pkill -f "Mr. Mags" || true; exit 1; }
          # Probe MCP relay the way Claude Desktop does — spawn server.js via
          # ELECTRON_RUN_AS_NODE, send initialize + tools/list, assert memory_save
          APP_BIN="/Applications/Mr. Mags.app/Contents/MacOS/Mr. Mags"
          SERVER_JS="/Applications/Mr. Mags.app/Contents/Resources/app/server/index.js"
          [ -f "$SERVER_JS" ] || { echo "FAIL: server/index.js missing at $SERVER_JS"; ls -la "/Applications/Mr. Mags.app/Contents/Resources/" || true; pkill -f "Mr. Mags"; exit 1; }
          echo "MCP probe..."
          PROBE_OUT=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"smoke","version":"1.0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | (ELECTRON_RUN_AS_NODE=1 MRMAGS_DATA_DIR="$HOME/Library/Application Support/Mr. Mags" "$APP_BIN" "$SERVER_JS" & sleep 10; kill $! 2>/dev/null) 2>&1 | head -50)
          echo "$PROBE_OUT" | head -10
          echo "$PROBE_OUT" | grep -q '"name":"memory_save"' || { echo "FAIL: memory_save not in tools/list response"; pkill -f "Mr. Mags"; exit 1; }
          echo "✓ MCP tools list returned memory_save"
          # Round-trip: write a memory via HTTP, read it back, assert content
          curl -fsS -X POST http://127.0.0.1:11436/memory \
            -H "content-type: application/json" \
            --data '{"filename":"smoke.md","content":"smoke ran on macos GHA at '"$GITHUB_SHA"'"}' >/dev/null
          COUNT=$(curl -fsS --max-time 5 http://127.0.0.1:11436/health | python3 -c "import json,sys;print(json.load(sys.stdin)['memory_count'])")
          [ "$COUNT" = "1" ] || { echo "FAIL: memory_count = $COUNT, expected 1"; pkill -f "Mr. Mags"; exit 1; }
          echo "✓ memory write + count round-trip works"
          # Cleanup
          pkill -f "Mr. Mags" || true
          sleep 1
          echo "✓ Mac smoke test passed"
      - name: Upload .dmg artifact (always — preserves the build even if smoke fails)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mrmags-mac-dmg
          path: dist/*.dmg
          if-no-files-found: warn
          retention-days: 30
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          fail_on_unmatched_files: false
          generate_release_notes: true
      - name: Publish to cdn.mrmags.org (R2)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Upload the universal DMG with a versionless filename (per the
          # MEDiAGATO installer-filename rule). Branded URL is the public path:
          #   https://cdn.mrmags.org/Mr-Mags.dmg → always the latest tagged build.
          DMG=$(ls dist/*.dmg | head -1)
          npx wrangler@latest r2 object put mrmags-cdn/Mr-Mags.dmg \
            --file "$DMG" --content-type application/x-apple-diskimage --remote
          # Also keep a versioned copy so old releases stay fetchable
          VERSION="${GITHUB_REF#refs/tags/v}"
          npx wrangler@latest r2 object put "mrmags-cdn/versions/Mr-Mags-${VERSION}.dmg" \
            --file "$DMG" --content-type application/x-apple-diskimage --remote

  # GUI smoke — runs on the self-hosted Mac runner (Elizabeth's family Mac,
  # Apple Silicon, real user session). Catches the v0.2.7 class of bug where
  # the binary launches cleanly but the GUI surface (menu bar icon,
  # notifications) silently fails to register. macos-latest can't catch this
  # because GHA-hosted runners are headless — no display server means
  # NSStatusBar items can't register at all.
  #
  # Gated to workflow_dispatch until the self-hosted runner is online, then
  # flip the trigger to push for every-build coverage. See:
  #   docs/SELF_HOSTED_MAC_RUNNER.md  — runner setup playbook
  #   docs/SMOKE_TEST_GAPS.md         — root cause + design rationale
  gui-smoke-mac:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, macOS, real-mac]
    needs: build-mac
    timeout-minutes: 10
    steps:
      - name: Download .dmg artifact
        uses: actions/download-artifact@v4
        with:
          name: mrmags-mac-dmg
          path: dist
      - name: Install + GUI presence assertions
        shell: bash
        run: |
          set -ex
          DMG=$(ls dist/*.dmg | head -1)
          # Same install dance as build-mac smoke
          hdiutil attach -nobrowse -noverify -plist "$DMG" > /tmp/mount.plist
          VOLUME=$(grep -o '/Volumes/[^<]*' /tmp/mount.plist | tail -1)
          [ -n "$VOLUME" ] || { echo "FAIL: mount returned no volume"; exit 1; }
          rm -rf "/Applications/Mr. Mags.app"
          cp -R "$VOLUME/Mr. Mags.app" "/Applications/"
          hdiutil detach "$VOLUME" || hdiutil detach -force "$VOLUME"
          xattr -dr com.apple.quarantine "/Applications/Mr. Mags.app" || true
          # Launch via open(1) — runs in user session (which the self-hosted
          # runner has, unlike macos-latest)
          open -n "/Applications/Mr. Mags.app"
          # Wait for HTTP API (same as build-mac smoke)
          for i in $(seq 1 60); do
            if curl -fsS --max-time 3 http://127.0.0.1:11436/health >/dev/null 2>&1; then
              echo "API came up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -fsS --max-time 5 http://127.0.0.1:11436/health || { echo "FAIL: /health never came up"; pkill -f "Mr. Mags" || true; exit 1; }
          # Give the tray icon registration a beat to settle (electron startup
          # is async; the StatusItem registers after main.ready)
          sleep 5
          # GUI assertion 1: NSStatusBar item must exist for Mr. Mags.
          # Counts menu bar items belonging to the Mr. Mags process.
          # Menu bar 2 in System Events == the rightmost (status) menu bar.
          ITEM_COUNT=$(osascript -e '
            tell application "System Events"
              try
                count menu bar items of menu bar 2 of (first process whose name is "Mr. Mags")
              on error
                return 0
              end try
            end tell' 2>/dev/null || echo "0")
          [ "$ITEM_COUNT" -gt "0" ] || { echo "FAIL: Mr. Mags menu bar icon not present (count=$ITEM_COUNT)"; pkill -f "Mr. Mags" || true; exit 1; }
          echo "✓ menu bar icon registered (items: $ITEM_COUNT)"
          # GUI assertion 2: process is the GUI process (not just a headless
          # background helper). LSBackgroundOnly should NOT be set on the main
          # bundle — accessory apps register a tray icon AND have the main
          # process running. We check the bundle's Info.plist directly.
          PLIST="/Applications/Mr. Mags.app/Contents/Info.plist"
          BG_ONLY=$(defaults read "$PLIST" LSUIElement 2>/dev/null || echo "0")
          # Mr. Mags IS LSUIElement=1 by design (no Dock icon — menu bar only),
          # but the process should still be running. We just log this for
          # diagnostic context; the menu-bar count above is the actual gate.
          echo "LSUIElement=$BG_ONLY (1 expected for menu-bar-only apps)"
          # Cleanup
          pkill -f "Mr. Mags" || true
          sleep 1
          echo "✓ Mac GUI smoke passed"

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci || npm install
      - name: Build NSIS .exe
        env:
          # Same — skip win signing for v0. SmartScreen warning the first time;
          # user clicks "More info → Run anyway." Code-signing wires in later.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:win
      - run: dir dist
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: mrmags-windows-exe
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 30
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          fail_on_unmatched_files: false
          generate_release_notes: true
      - name: Publish to cdn.mrmags.org (R2)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          EXE=$(ls dist/*.exe | head -1)
          npx wrangler@latest r2 object put mrmags-cdn/Mr-Mags-Setup.exe \
            --file "$EXE" --content-type application/x-msdownload --remote
          VERSION="${GITHUB_REF#refs/tags/v}"
          npx wrangler@latest r2 object put "mrmags-cdn/versions/Mr-Mags-Setup-${VERSION}.exe" \
            --file "$EXE" --content-type application/x-msdownload --remote
